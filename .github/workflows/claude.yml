name: Claude Code

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: ${{ github.workflow }}
      cancel-in-progress: false
    if: |
      (github.event_name == 'issues' &&
       contains(github.event.issue.labels.*.name, 'sentry-autofix') &&
       github.event.issue.user.login == 'sentry[bot]') ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '@claude') &&
       contains(fromJSON('["MEMBER","OWNER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' &&
       contains(github.event.comment.body, '@claude') &&
       contains(fromJSON('["MEMBER","OWNER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review' &&
       contains(github.event.review.body, '@claude') &&
       contains(fromJSON('["MEMBER","OWNER","COLLABORATOR"]'), github.event.review.author_association))
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Skip if human is handling this
        id: check
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE=$(gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }})
          ASSIGNEE=$(echo "$ISSUE" | jq -r '.assignee.login // empty')
          HAS_LABEL=$(echo "$ISSUE" | jq '[.labels[].name] | any(. == "sentry-autofix")')
          if [ -n "$ASSIGNEE" ]; then
            echo "Issue assigned to $ASSIGNEE - skipping autofix"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$HAS_LABEL" != "true" ]; then
            echo "sentry-autofix label removed - skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

      - uses: anthropics/claude-code-action@26ec041249acb0a944c0a47b6c0c13f05dbc5b44 # v1
        if: steps.check.outputs.skip != 'true'
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_bots: "sentry[bot]"
